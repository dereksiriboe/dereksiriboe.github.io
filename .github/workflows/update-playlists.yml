name: Update Spotify Playlists

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update-playlists:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update playlists data
        env:
          SPOTIFY_PLAYLISTS_PAGE_URL: ${{ secrets.SPOTIFY_PLAYLISTS_PAGE_URL }}
        run: node scripts/update-playlists.mjs

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- data/playlists.json; then
            echo "No playlist changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/playlists.json
          git commit -m "Update playlists from Spotify scrape"
          git push
